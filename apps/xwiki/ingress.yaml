apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xwiki
  namespace: xwiki
spec:
  rules:
    - host: xwiki.esp.edu.kg
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: xwiki
                port:
                  number: 8080

