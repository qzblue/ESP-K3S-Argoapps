apiVersion: apps/v1
kind: Deployment
metadata:
  name: xwiki
  namespace: xwiki
  labels:
    app: xwiki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xwiki
  template:
    metadata:
      labels:
        app: xwiki
    spec:
      containers:
        - name: xwiki
          image: xwiki:18.1.0-mysql-tomcat
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_HOST
              value: "10.32.65.22"
            - name: DB_DATABASE
              value: "xwiki"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: xwiki-db
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: xwiki-db
                  key: DB_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: xwiki-data
              mountPath: /usr/local/xwiki
      volumes:
        - name: xwiki-data
          persistentVolumeClaim:
            claimName: xwiki-data
