apiVersion: batch/v1
kind: Job
metadata:
  name: limesurvey-upload-permission-fix
  namespace: limesurvey
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: fix-perms
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -ec
            - |
              mkdir -p /data/surveys /data/users /data/themes/question /data/themes/survey /data/themes/user
              chown -R 33:33 /data
              find /data -type d -exec chmod 775 {} \;
              find /data -type f -exec chmod 664 {} \;
              echo "upload directory permissions fixed"
          volumeMounts:
            - name: limesurvey-data
              mountPath: /data
      volumes:
        - name: limesurvey-data
          persistentVolumeClaim:
            claimName: limesurvey-data
