apiVersion: v1
kind: ConfigMap
metadata:
  name: limesurvey-apache-conf
  namespace: limesurvey
data:
  000-default.conf: |
    <VirtualHost *:8080>
        DocumentRoot /var/www/html

        <Directory /var/www/html>
            AllowOverride All
            Require all granted
            Options FollowSymLinks
        </Directory>

        ErrorLog /proc/self/fd/2
        CustomLog /proc/self/fd/1 combined
    </VirtualHost>
